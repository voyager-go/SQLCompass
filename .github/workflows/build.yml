name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"
  BINARY_NAME: SQLCompass
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS Universal Binary
        run: wails build -clean -platform darwin/universal

      - name: Package as ZIP
        run: cd build/bin && zip -r "${{ env.BINARY_NAME }}-macOS-Universal.zip" "${{ env.BINARY_NAME }}.app"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-macOS-Universal
          path: build/bin/${{ env.BINARY_NAME }}-macOS-Universal.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install NSIS (installer generator)
        run: choco install nsis -y

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows executable
        run: wails build -clean

      - name: Rename output with platform suffix
        shell: pwsh
        run: |
          Get-ChildItem "build/bin" -Filter "*.exe" | ForEach-Object {
            $new = $_.Name -replace '\.exe$', '-Windows-amd64.exe'
            Rename-Item $_.FullName "build/bin\$new"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-Windows
          path: build/bin/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies (GTK + WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux binary
        run: wails build -clean -tags webkit2_41

      - name: Package as tarball
        run: tar czf "build/bin/${{ env.BINARY_NAME }}-Linux-amd64.tar.gz" -C build/bin "${{ env.BINARY_NAME }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-Linux-amd64
          path: build/bin/${{ env.BINARY_NAME }}-Linux-amd64.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            **/*.zip
            **/*.exe
            **/*.tar.gz
